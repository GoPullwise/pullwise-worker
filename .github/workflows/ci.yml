name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade "pip>=25.3,<27" setuptools wheel
          python -m pip install -e .
          python -m pip install "pip-audit>=2.10.1,<2.11"
      - name: Audit Python dependencies
        run: pip-audit .
      - name: Check Python dependency constraints
        run: python -m pip check
      - name: Check shell scripts
        run: |
          bash -n ./deploy/update-worker.sh
          bash -n ./deploy/restart-worker.sh
          bash -n ./deploy/uninstall-worker.sh
          bash -n ./deploy/cleanup-checkouts.sh
      - name: Check semantic output contracts
        run: python scripts/check_output_contracts.py
      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" > unittest-output.log 2>&1
          test_status=$?
          set -e
          cat unittest-output.log
          if (( test_status != 0 )); then
            details="$(tail -c 50000 unittest-output.log)"
            details="${details//'%'/'%25'}"
            details="${details//$'\r'/'%0D'}"
            details="${details//$'\n'/'%0A'}"
            echo "::error title=Unit test failure::$details"
          fi
          exit "$test_status"
