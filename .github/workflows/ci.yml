name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1" setuptools wheel
          python -m pip install -e .
          python -m pip install pip-audit "filelock>=3.20.3"
      - name: Audit Python dependencies
        run: pip-audit -r requirements-audit.txt
      - name: Check Python dependency compatibility
        run: python -m pip check
      - name: Check shell scripts
        run: |
          bash -n ./deploy/install-worker.sh
          bash -n ./deploy/update-worker.sh
          bash -n ./deploy/restart-worker.sh
          bash -n ./deploy/uninstall-worker.sh
          bash -n ./deploy/cleanup-checkouts.sh
      - name: Run tests
        run: python -m unittest
