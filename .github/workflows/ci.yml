name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade "pip>=25.3,<27" setuptools wheel
          python -m pip install -e .
      - name: Check Python dependency constraints
        run: python -m pip check
      - name: Check shell scripts
        run: |
          bash -n ./deploy/update-worker.sh
          bash -n ./deploy/restart-worker.sh
          bash -n ./deploy/uninstall-worker.sh
          bash -n ./deploy/cleanup-checkouts.sh
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
