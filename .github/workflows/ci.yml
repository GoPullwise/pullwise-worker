name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: pullwise-worker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pullwise-worker
      - name: Check out frozen Server contract producer
        uses: actions/checkout@v4
        with:
          repository: GoPullwise/pullwise-server
          ref: d68487a283bbc28e526ffac623cb3dd1f06cd4e9
          path: pullwise-server
      - name: Check out current Server contract producer
        uses: actions/checkout@v4
        with:
          repository: GoPullwise/pullwise-server
          ref: e997688beb7ec9d071d3e3c20e2685edd98c36fc
          path: current-contract-server
      - name: Check out frozen Web contract consumer
        uses: actions/checkout@v4
        with:
          repository: GoPullwise/pullwise-web
          ref: 0af3088a86a3474b6f8b937958137db438098d48
          path: pullwise-web
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade "pip>=25.3,<27" setuptools wheel
          python -m pip install -e .
          python -m pip install -e ../pullwise-server
          python -m pip install "pip-audit>=2.10.1,<2.11"
      - name: Audit Python dependencies
        run: pip-audit .
      - name: Check Python dependency constraints
        run: python -m pip check
      - name: Check shell scripts
        run: |
          bash -n ./deploy/update-worker.sh
          bash -n ./deploy/restart-worker.sh
          bash -n ./deploy/uninstall-worker.sh
          bash -n ./deploy/cleanup-checkouts.sh
      - name: Check Agent-First legacy absence ratchet
        run: python scripts/verify_agent_first_legacy_absence.py --workspace-root ..
      - name: Check semantic output contracts
        run: python scripts/check_output_contracts.py
      - name: Check isolated Agent Kernel wheel
        run: python scripts/check_agent_kernel_wheel.py
      - name: Check current Agent-First package exact lock
        env:
          PULLWISE_CURRENT_SERVER_ROOT: ../current-contract-server
        run: |
          python -m unittest \
            tests.test_agent_kernel_current_package.AgentKernelCurrentPackageTest.test_worker_pin_is_the_generated_package_tuple \
            tests.test_agent_kernel_current_package.AgentKernelCurrentPackageTest.test_worker_wrapper_is_exact_server_artifact \
            tests.test_agent_kernel_current_package.AgentKernelCurrentPackageTest.test_d22_release_gate_schemas_and_golden_fixtures_are_public
      - name: Run tests
        env:
          PULLWISE_CURRENT_SERVER_ROOT: ../current-contract-server
        run: python -m unittest discover -s tests -p "test_*.py"
