name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade \
            "pip>=25.3,<26; python_version < '3.10'" \
            "pip>=26.1.2,<27; python_version >= '3.10'" \
            setuptools wheel
          python -m pip install -e .
      - name: Install audit dependencies
        if: matrix.python-version == '3.10'
        run: |
          python -m pip install \
            "pip-audit>=2.10.1,<2.11" \
            "filelock>=3.20.3,<4"
      - name: Audit Python dependencies
        if: matrix.python-version == '3.10'
        run: pip-audit -r requirements-audit.txt
      - name: Check Python dependency compatibility
        run: python -m pip check
      - name: Check shell scripts
        run: |
          bash -n ./deploy/update-worker.sh
          bash -n ./deploy/restart-worker.sh
          bash -n ./deploy/uninstall-worker.sh
          bash -n ./deploy/cleanup-checkouts.sh
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
