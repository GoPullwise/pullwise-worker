name: Release

run-name: Release pullwise-worker ${{ github.event.inputs.version || github.ref_name }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to release, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${INPUT_VERSION}"
            version="${version#v}"
            tag="v${version}"
          fi
          case "$version" in
            ""|*[!0-9.]*|.*|*.|*..*) echo "Invalid version: $version"; exit 1 ;;
          esac
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Update package version
        if: github.ref_type != 'tag'
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          replacements = {
              Path("pyproject.toml"): (r'^version = "[^"]+"', f'version = "{version}"'),
              Path("pullwise_worker/__init__.py"): (r'^__version__ = "[^"]+"', f'__version__ = "{version}"'),
              Path("deploy/worker.env.template"): (
                  r'^PULLWISE_WORKER_PACKAGE=.*$',
                  f'PULLWISE_WORKER_PACKAGE=https://github.com/GoPullwise/pullwise-worker/releases/download/v{version}/pullwise_worker-{version}-py3-none-any.whl',
              ),
          }
          for path, (pattern, replacement) in replacements.items():
              text = path.read_text(encoding="utf-8")
              updated = re.sub(pattern, replacement, text, count=1, flags=re.M)
              if updated == text and replacement not in text:
                  raise SystemExit(f"unable to update version in {path}")
              path.write_text(updated, encoding="utf-8", newline="\n")
          PY

      - name: Validate release version sources
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          expected_url = (
              "https://github.com/GoPullwise/pullwise-worker/releases/download/"
              f"v{version}/pullwise_worker-{version}-py3-none-any.whl"
          )
          checks = {
              "pyproject.toml": re.search(
                  r'^version = "([^"]+)"',
                  Path("pyproject.toml").read_text(encoding="utf-8"),
                  re.M,
              ),
              "pullwise_worker/__init__.py": re.search(
                  r'^__version__ = "([^"]+)"',
                  Path("pullwise_worker/__init__.py").read_text(encoding="utf-8"),
                  re.M,
              ),
              "deploy/worker.env.template": re.search(
                  r'^PULLWISE_WORKER_PACKAGE=(.+)$',
                  Path("deploy/worker.env.template").read_text(encoding="utf-8"),
                  re.M,
              ),
          }
          actual = {}
          for source_path, match in checks.items():
              if not match:
                  raise SystemExit(f"unable to read release version source: {source_path}")
              actual[source_path] = match.group(1)
          expected = {
              "pyproject.toml": version,
              "pullwise_worker/__init__.py": version,
              "deploy/worker.env.template": expected_url,
          }
          mismatches = [
              f"{source_path}: expected {expected[source_path]!r}, found {value!r}"
              for source_path, value in actual.items()
              if value != expected[source_path]
          ]
          if mismatches:
              raise SystemExit("release version source mismatch:\n" + "\n".join(mismatches))
          PY

      - name: Build distributions
        run: |
          rm -rf build dist
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install --dry-run --no-deps dist/*.whl

      - name: Validate built distribution version
        run: |
          python - <<'PY'
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          expected_wheel = f"pullwise_worker-{version}-py3-none-any.whl"
          dist_files = sorted(path.name for path in Path("dist").iterdir())
          if expected_wheel not in dist_files:
              raise SystemExit(f"missing expected wheel {expected_wheel}; found {dist_files}")

          with zipfile.ZipFile(Path("dist") / expected_wheel) as wheel:
              metadata_names = [name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")]
              if len(metadata_names) != 1:
                  raise SystemExit(f"expected one wheel METADATA file, found {metadata_names}")
              metadata = wheel.read(metadata_names[0]).decode("utf-8")
          wheel_version = next((line.partition(":")[2].strip() for line in metadata.splitlines() if line.startswith("Version:")), "")
          if wheel_version != version:
              raise SystemExit(f"wheel metadata version {wheel_version!r} does not match {version}")

          expected_sdist = f"pullwise_worker-{version}.tar.gz"
          sdist_path = Path("dist") / expected_sdist
          if not sdist_path.exists():
              raise SystemExit(f"missing expected source archive {expected_sdist}; found {dist_files}")
          with tarfile.open(sdist_path) as sdist:
              pkg_info_names = [name for name in sdist.getnames() if name.endswith("/PKG-INFO")]
              if not pkg_info_names:
                  raise SystemExit("source archive is missing PKG-INFO")
              pkg_info_file = sdist.extractfile(pkg_info_names[0])
              if pkg_info_file is None:
                  raise SystemExit("unable to read source archive PKG-INFO")
              pkg_info = pkg_info_file.read().decode("utf-8")
          sdist_version = next((line.partition(":")[2].strip() for line in pkg_info.splitlines() if line.startswith("Version:")), "")
          if sdist_version != version:
              raise SystemExit(f"source archive metadata version {sdist_version!r} does not match {version}")
          PY

      - name: Commit package version
        if: github.ref_type != 'tag'
        run: |
          if git diff --quiet -- pyproject.toml pullwise_worker/__init__.py deploy/worker.env.template; then
            echo "Package version already set to $RELEASE_VERSION"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml pullwise_worker/__init__.py deploy/worker.env.template
          git commit -m "Release pullwise-worker v$RELEASE_VERSION"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - name: Create release tag
        if: github.ref_type != 'tag'
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
            current_sha="$(git rev-parse HEAD)"
            test "$existing_sha" = "$current_sha" || { echo "tag $RELEASE_TAG already points at $existing_sha, not $current_sha"; exit 1; }
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pullwise-worker-dist
          path: dist/*

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --generate-notes
          fi
