name: Release

run-name: Release pullwise-worker ${{ github.event.inputs.version || github.ref_name }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to release, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve release version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ inputs.version }}"
            version="${version#v}"
            tag="v${version}"
          fi
          case "$version" in
            ""|*[!0-9.]*|.*|*.) echo "Invalid version: $version"; exit 1 ;;
          esac
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Update package version
        if: github.ref_type != 'tag'
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          replacements = {
              Path("pyproject.toml"): (r'^version = "[^"]+"', f'version = "{version}"'),
              Path("pullwise_worker/__init__.py"): (r'^__version__ = "[^"]+"', f'__version__ = "{version}"'),
              Path("deploy/install-worker.sh"): (
                  r'^DEFAULT_WORKER_VERSION="[^"]+"',
                  f'DEFAULT_WORKER_VERSION="{version}"',
              ),
              Path("deploy/worker.env.template"): (
                  r'^PULLWISE_WORKER_PACKAGE=.*$',
                  f'PULLWISE_WORKER_PACKAGE=https://github.com/GoPullwise/pullwise-worker/releases/download/v{version}/pullwise_worker-{version}-py3-none-any.whl',
              ),
          }
          for path, (pattern, replacement) in replacements.items():
              text = path.read_text(encoding="utf-8")
              updated = re.sub(pattern, replacement, text, count=1, flags=re.M)
              if updated == text and replacement not in text:
                  raise SystemExit(f"unable to update version in {path}")
              path.write_text(updated, encoding="utf-8", newline="\n")
          PY

      - name: Commit package version
        if: github.ref_type != 'tag'
        run: |
          if git diff --quiet -- pyproject.toml pullwise_worker/__init__.py deploy/install-worker.sh deploy/worker.env.template; then
            echo "Package version already set to $RELEASE_VERSION"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml pullwise_worker/__init__.py deploy/install-worker.sh deploy/worker.env.template
          git commit -m "Release pullwise-worker v$RELEASE_VERSION"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - name: Validate tag matches package version
        run: |
          actual="$(python -c "import re; text=open('pyproject.toml', encoding='utf-8').read(); print(re.search(r'^version = \"([^\"]+)\"', text, re.M).group(1))")"
          test "$actual" = "$RELEASE_VERSION" || { echo "requested version $RELEASE_VERSION does not match pyproject version $actual"; exit 1; }

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install --dry-run --no-deps dist/*.whl

      - name: Create release tag
        if: github.ref_type != 'tag'
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
            current_sha="$(git rev-parse HEAD)"
            test "$existing_sha" = "$current_sha" || { echo "tag $RELEASE_TAG already points at $existing_sha, not $current_sha"; exit 1; }
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pullwise-worker-dist
          path: dist/*

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --generate-notes
          fi
