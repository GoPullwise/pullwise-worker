[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "pullwise-worker"
version = "0.8.1"
description = "Pullwise pull-based scan worker"
requires-python = ">=3.10"
# The Python package intentionally has no third-party Python runtime
# dependencies. Host prerequisites such as git, systemd, Node.js/npm, and the
# Codex CLI are validated by `pullwise-worker doctor` and installed by the
# server-delivered deploy scripts, because they are system/CLI capabilities
# rather than Python packages.
dependencies = []

[project.scripts]
pullwise-worker = "pullwise_worker.main:main"

[tool.setuptools.packages.find]
include = ["pullwise_worker", "codereview", "codereview.*"]
